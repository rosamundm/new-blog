{% extends "base.html" %}
{% load wagtailcore_tags %}
{% block body_class %}
  template-blogindexpage
{% endblock %}

{% block content %}

<div class="card-grid">
  {% for post in posts %}
    <article class="card">
      <h2>
        <a href="{% pageurl post %}">
          {{ post.title }}
        </a>
      </h2>
      <p>
        {{ post.specific.introduction }}
      </p>
    </article>
  {% endfor %}
</div>

{% endblock %}
